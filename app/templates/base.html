<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block titulo %}Sofia · Allos{% endblock %}</title>

  {# PWA: a Thainá instala o painel na tela inicial do celular. #}
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2E9E8F">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/static/icons/sofia-192.png">
  <link rel="apple-touch-icon" href="/static/icons/sofia-apple-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Sofia">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/allos.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
  {% block corpo %}{% endblock %}
  {% block scripts %}{% endblock %}
  <script>
    // Registra o service worker (requisito pra "Adicionar à tela inicial").
    // Falha aqui não afeta o painel: é só a instalabilidade do PWA.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').catch(function () {});
      });
    }

    // Acessibilidade: linha clicável de tabela (tr[onclick] + tabindex) também
    // abre com Enter/Espaço. Delegado no document porque o HTMX troca os
    // fragmentos (lista a cada 15s) e um listener por linha se perderia.
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const tr = e.target.closest('tr[tabindex][onclick]');
      if (!tr || e.target !== tr) return;
      e.preventDefault();
      tr.click();
    });
  </script>
</body>
</html>
