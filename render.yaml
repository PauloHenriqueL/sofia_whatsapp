# Deploy da Sofia no Render.
# As variáveis com `sync: false` são preenchidas no dashboard do Render (segredos).
services:
  - type: web
    name: sofia
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      # Marca como lida + "digitando…" + espaça as bolhas no tempo (UX).
      - key: SIMULAR_DIGITACAO
        value: "true"
      # Janela de agrupamento por conversa: junta rajadas de mensagens numa
      # resposta só (Demanda 2). Sugestão 4 a 8 segundos.
      - key: DEBOUNCE_SEGUNDOS
        value: "6"

      # WhatsApp Cloud API
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: THAINA_WHATSAPP_NUMBER
        sync: false
      - key: ALERT_TEMPLATE_NAME
        value: alerta_thaina

      # OpenAI
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      # Modelo de transcrição de áudio (a Sofia "ouve" áudio via Whisper).
      - key: OPENAI_AUDIO_MODEL
        value: whisper-1
      # OPENAI_TEMPERATURE não é definida aqui de propósito: usa o padrão (0.7) do
      # código, e a Sofia reenvia sem temperature se o modelo rejeitar. Pra forçar
      # o padrão do modelo (sem retry), defina OPENAI_TEMPERATURE vazio no dashboard.

      # Banco (Neon)
      - key: DATABASE_URL
        sync: false

      # Hamilton (auth JWT)
      - key: HAMILTON_API_URL
        sync: false
      - key: HAMILTON_USERNAME
        sync: false
      - key: HAMILTON_PASSWORD
        sync: false

      # Painel
      - key: PAINEL_USER
        value: thaina
      - key: PAINEL_PASSWORD
        sync: false

      # App
      - key: SECRET_KEY
        sync: false

      # Cron externo do follow-up de lead parado (POST /tasks/seguimentos).
      # VAZIO = endpoint DESLIGADO (responde 403). Sem isto, o follow-up não sai.
      - key: TASKS_TOKEN
        sync: false

      # A Sofia ouve áudio (Whisper) e responde em texto. Custa por minuto.
      # Editável em runtime no /painel/config; aqui é só o valor inicial.
      - key: TRANSCREVER_AUDIO
        value: "true"

      # ATENÇÃO — NÃO defina SOFIA_API_DATABASE_URL aqui nem no dashboard deste
      # serviço. Essa env pertence ao serviço do **Hamilton** e, enquanto estiver
      # setada lá, TODOS os cadastros (inclusive de paciente real) vão pro banco
      # de teste. Ver DEPLOY.md.
